<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="/favicon.png" />
    <title>Links — Thairlan Anjos</title>
    <meta name="description" content="Thairlan Anjos - Meus links de redes sociais." />
    <meta property="og:title" content="Links — Thairlan Anjos" />
    <meta property="og:description" content="Thairlan Anjos - Meus links de redes sociais." />
    <meta property="og:type" content="website" />

    <!-- Iconify script -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Fontes do site original -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Petrona:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f7f6f3;
        --accent: #1a2238;
        --muted: #666666;
        --link-hover: #e8e6e1;
        --font-heading: "Instrument Serif", serif;
        --font-body: "Petrona", serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--accent);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 60px 20px;
        transition: background-color 0.5s, color 0.5s;
        overflow-y: auto;
      }
      .container {
        max-width: 500px; /* Largura levemente maior para o grid */
        width: 100%;
        text-align: center;
      }
      
      header {
        margin-bottom: 40px;
      }
      
      /* Acessibilidade: Título H1 único para estrutura semântica clara */
      h1 {
        font-family: var(--font-heading);
        font-size: clamp(32px, 8vw, 42px);
        font-weight: normal;
        line-height: 1.2;
      }

      /* Acessibilidade: Nav com label para leitores de tela */
      nav {
        width: 100%;
      }

      /* Acessibilidade: Grid responsivo para os links */
      ul {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 2 colunas */
        gap: 16px;
      }

      /* Snapchat e Substack como destaque ou grid irregular se desejar, 
         mas manteremos o grid 2x2 para minimalismo. O último item ocupará 2 colunas se ímpar. */
      li:last-child:nth-child(odd) {
        grid-column: span 2;
      }

      /* Estilo minimalista dos links em grid */
      .link-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px 12px;
        border: 1px solid var(--accent);
        text-decoration: none;
        color: var(--accent);
        font-size: 16px;
        transition: all 0.3s ease;
        border-radius: 12px;
      }

      .link-item iconify-icon {
        font-size: 28px;
        /* Garante que o ícone herde a cor do texto para manter o branding monochrome */
        color: currentColor;
      }

      /* Acessibilidade: Estados de hover e focus para feedback visual */
      .link-item:hover {
        background-color: var(--accent);
        color: var(--bg);
      }

      /* Acessibilidade: Anel de foco de alto contraste para navegação por teclado */
      .link-item:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
        background-color: var(--accent);
        color: var(--bg);
      }

      /* Acessibilidade: Link de pular conteúdo (escondido até ganhar foco) */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--accent);
        color: var(--bg);
        padding: 8px;
        z-index: 1000;
        transition: top 0.3s;
        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }

      footer {
        margin-top: 60px;
        font-size: 14px;
        color: var(--muted);
        transition: color 0.5s;
      }

      /* --- CÓDIGO DARK MODE --- */
      .dark-mode-switch {
        display: block;
        --width-of-switch: 2.8em;
        --height-of-switch: 1.5em;
        --size-of-icon: 1.1em;
        --slider-offset: 0.2em;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        width: var(--width-of-switch);
        height: var(--height-of-switch);
      }
      .dark-mode-switch input { opacity: 0; width: 0; height: 0; }
      .dark-mode-slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: var(--bg);
        border: 1px solid var(--accent);
        transition: .4s;
        border-radius: 30px;
      }
      .dark-mode-slider:before {
        position: absolute;
        content: "";
        height: var(--size-of-icon);
        width: var(--size-of-icon);
        border-radius: 20px;
        left: var(--slider-offset);
        top: 50%;
        transform: translateY(-50%);
        background-color: var(--accent);
        transition: .4s, box-shadow .4s;
      }
      input:checked + .dark-mode-slider:before {
        left: calc(100% - (var(--size-of-icon) + var(--slider-offset)));
        background-color: var(--bg);
        box-shadow: inset -0.25em -0.15em 0 0 var(--accent);
      }

      body.dark-mode-active {
        --bg: #1a2238; 
        --accent: #f7f6f3;
        --muted: #999999; 
      }
      /* --- FIM DO CÓDIGO DARK MODE --- */

    </style>
  </head>
  <body>
    <!-- Acessibilidade: Link para pular direto para o conteúdo (visível apenas ao tabular) -->
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <!-- Acessibilidade: Main para indicar o conteúdo central -->
    <main class="container" id="main-content">
      <header>
        <h1>Thairlan Anjos</h1>
      </header>

      <nav aria-label="Meus Links de Redes Sociais">
        <ul>
          <li>
            <a href="https://go.thairlananjos.com/goodreads" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:book-line" aria-hidden="true"></iconify-icon>
              <span>Goodreads</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/instagram" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:instagram-line" aria-hidden="true"></iconify-icon>
              <span>Instagram</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/bluesky" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:bluesky-line" aria-hidden="true"></iconify-icon>
              <span>Bluesky</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/threads" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:threads-line" aria-hidden="true"></iconify-icon>
              <span>Threads</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/snapchat" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:snapchat-line" aria-hidden="true"></iconify-icon>
              <span>Snapchat</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/substack" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="simple-icons:substack" aria-hidden="true"></iconify-icon>
              <span>Substack</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/twitter" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:twitter-x-line" aria-hidden="true"></iconify-icon>
              <span>Twitter</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/pinterest" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:pinterest-line" aria-hidden="true"></iconify-icon>
              <span>Pinterest</span>
            </a>
          </li>
        </ul>
      </nav>

      <footer>
        &copy; <span id="year"></span> Thairlan Anjos
      </footer>
    </main>

    <!-- HTML do Switch Dark Mode -->
    <label class="dark-mode-switch" title="Alternar modo light/dark">
      <input type="checkbox" id="dark-mode-checkbox" aria-label="Alternar modo escuro">
      <span class="dark-mode-slider"></span>
    </label>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Atualizar o ano no rodapé automaticamente
      document.getElementById('year').textContent = new Date().getFullYear();

      // Lógica do Dark Mode (reutilizada do original)
      const toggle = document.getElementById('dark-mode-checkbox');
      const body = document.body;
      const storageKey = 'darkMode';

      function applyDarkMode(isDark) {
        body.classList.toggle('dark-mode-active', isDark);
        toggle.checked = isDark;
      }

      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
      const savedState = localStorage.getItem(storageKey);

      if (savedState !== null) {
        applyDarkMode(savedState === 'true');
      } else {
        applyDarkMode(prefersDark.matches);
      }

      toggle.addEventListener('change', function() {
        const isChecked = toggle.checked;
        applyDarkMode(isChecked);
        localStorage.setItem(storageKey, isChecked);
      });

      prefersDark.addEventListener('change', (e) => {
        if (localStorage.getItem(storageKey) === null) {
          applyDarkMode(e.matches);
        }
      });
    });
    </script>
  </body>
</html>
