<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="/favicon.png" />
    <title>Links — Thairlan Anjos</title>
    <meta name="description" content="Thairlan Anjos - Meus links de redes sociais." />
    <meta property="og:title" content="Links — Thairlan Anjos" />
    <meta property="og:description" content="Thairlan Anjos - Meus links de redes sociais." />
    <meta property="og:type" content="website" />

    <!-- Iconify script -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Fontes do site original -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Petrona:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f7f6f3;
        --accent: #1a2238;
        --muted: #666666;
        --link-hover: #e8e6e1;
        --font-heading: "Instrument Serif", serif;
        --font-body: "Petrona", serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--accent);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 60px 20px 80px; /* Aumentado o padding inferior */
        transition: background-color 0.5s, color 0.5s;
        overflow-y: auto;
      }
      .container {
        max-width: 500px;
        width: 100%;
        text-align: center;
      }
      
      header {
        margin-bottom: 48px;
      }
      
      h1 {
        font-family: var(--font-heading);
        font-size: clamp(36px, 10vw, 48px);
        font-weight: normal;
        line-height: 1.2;
      }

      /* Títulos das Seções */
      h2 {
        font-family: var(--font-heading);
        font-size: 24px;
        font-weight: normal;
        margin-bottom: 20px;
        text-align: left;
        opacity: 0.9;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      /* Seção de Livros (Lista) */
      .books-section {
        margin-bottom: 32px;
        width: 100%;
      }
      .books-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .book-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--accent);
        border-radius: 12px;
        text-align: left;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, background-color 0.2s;
      }
      .book-card:hover {
        background-color: rgba(26, 34, 56, 0.03);
      }
      body.dark-mode-active .book-card:hover {
        background-color: rgba(247, 246, 243, 0.05);
      }

      .book-cover {
        width: 45px;
        height: 65px;
        background-color: var(--accent);
        border-radius: 4px;
        object-fit: cover;
        flex-shrink: 0;
        /* Estilo para imagem não carregada */
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bg);
        font-size: 10px;
      }
      .book-info {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .book-title {
        font-family: var(--font-heading);
        font-size: 18px;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .book-author {
        font-size: 13px;
        color: var(--muted);
      }

      .more-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 16px;
        font-size: 14px;
        color: var(--accent);
        text-decoration: none;
        opacity: 0.8;
        transition: opacity 0.2s;
      }
      .more-link:hover {
        opacity: 1;
        text-decoration: underline;
      }

      /* Linha Divisória */
      .divider {
        width: 100%;
        height: 1px;
        background-color: var(--accent);
        opacity: 0.2;
        margin: 40px 0;
        border: none;
      }

      /* Seção de Links */
      nav {
        width: 100%;
        text-align: left;
      }

      ul {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      li:last-child:nth-child(odd) {
        grid-column: span 2;
      }

      .link-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px 12px;
        border: 1px solid var(--accent);
        text-decoration: none;
        color: var(--accent);
        font-size: 16px;
        transition: all 0.3s ease;
        border-radius: 12px;
      }

      .link-item iconify-icon {
        font-size: 28px;
        color: currentColor;
      }

      .link-item:hover {
        background-color: var(--accent);
        color: var(--bg);
      }

      .link-item:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
        background-color: var(--accent);
        color: var(--bg);
      }

      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--accent);
        color: var(--bg);
        padding: 8px;
        z-index: 1000;
        transition: top 0.3s;
        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }

      footer {
        margin-top: 60px;
        font-size: 14px;
        color: var(--muted);
        transition: color 0.5s;
        text-align: center;
      }

      /* --- DARK MODE --- */
      .dark-mode-switch {
        display: block;
        --width-of-switch: 2.8em;
        --height-of-switch: 1.5em;
        --size-of-icon: 1.1em;
        --slider-offset: 0.2em;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        width: var(--width-of-switch);
        height: var(--height-of-switch);
      }
      .dark-mode-switch input { opacity: 0; width: 0; height: 0; }
      .dark-mode-slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: var(--bg);
        border: 1px solid var(--accent);
        transition: .4s;
        border-radius: 30px;
      }
      .dark-mode-slider:before {
        position: absolute;
        content: "";
        height: var(--size-of-icon);
        width: var(--size-of-icon);
        border-radius: 20px;
        left: var(--slider-offset);
        top: 50%;
        transform: translateY(-50%);
        background-color: var(--accent);
        transition: .4s, box-shadow .4s;
      }
      input:checked + .dark-mode-slider:before {
        left: calc(100% - (var(--size-of-icon) + var(--slider-offset)));
        background-color: var(--bg);
        box-shadow: inset -0.25em -0.15em 0 0 var(--accent);
      }

      body.dark-mode-active {
        --bg: #1a2238; 
        --accent: #f7f6f3;
        --muted: #999999; 
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <main class="container" id="main-content">
      <header>
        <h1>Thairlan Anjos</h1>
      </header>

      <!-- Leituras Recentes -->
      <section class="books-section">
        <h2>Leituras Recentes</h2>
        <div class="books-list" id="books-container">
          <div class="book-card">Carregando leituras...</div>
        </div>
        <a href="https://www.goodreads.com/user/show/106296664-thairlan-anjos" class="more-link" target="_blank" rel="noopener">
          <iconify-icon icon="simple-icons:goodreads"></iconify-icon>
          <span>Ver mais no Goodreads</span>
          <iconify-icon icon="ri:arrow-right-up-line"></iconify-icon>
        </a>
      </section>

      <hr class="divider">

      <!-- Links Úteis -->
      <nav aria-label="Links Úteis">
        <h2>Links Úteis</h2>
        <ul>
          <li>
            <a href="https://go.thairlananjos.com/goodreads" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="simple-icons:goodreads" aria-hidden="true"></iconify-icon>
              <span>Goodreads</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/instagram" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:instagram-line" aria-hidden="true"></iconify-icon>
              <span>Instagram</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/bluesky" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:bluesky-line" aria-hidden="true"></iconify-icon>
              <span>Bluesky</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/threads" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:threads-line" aria-hidden="true"></iconify-icon>
              <span>Threads</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/snapchat" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:snapchat-line" aria-hidden="true"></iconify-icon>
              <span>Snapchat</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/substack" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="simple-icons:substack" aria-hidden="true"></iconify-icon>
              <span>Substack</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/twitter" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:twitter-x-line" aria-hidden="true"></iconify-icon>
              <span>Twitter</span>
            </a>
          </li>
          <li>
            <a href="https://go.thairlananjos.com/pinterest" class="link-item" target="_blank" rel="noopener">
              <iconify-icon icon="ri:pinterest-line" aria-hidden="true"></iconify-icon>
              <span>Pinterest</span>
            </a>
          </li>
        </ul>
      </nav>

      <footer>
        &copy; <span id="year"></span> Thairlan Anjos
      </footer>
    </main>

    <!-- HTML do Switch Dark Mode -->
    <label class="dark-mode-switch" title="Alternar modo light/dark">
      <input type="checkbox" id="dark-mode-checkbox" aria-label="Alternar modo escuro">
      <span class="dark-mode-slider"></span>
    </label>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById('year').textContent = new Date().getFullYear();

      const toggle = document.getElementById('dark-mode-checkbox');
      const body = document.body;
      const storageKey = 'darkMode';

      function applyDarkMode(isDark) {
        body.classList.toggle('dark-mode-active', isDark);
        toggle.checked = isDark;
      }

      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
      const savedState = localStorage.getItem(storageKey);

      if (savedState !== null) {
        applyDarkMode(savedState === 'true');
      } else {
        applyDarkMode(prefersDark.matches);
      }

      toggle.addEventListener('change', function() {
        const isChecked = toggle.checked;
        applyDarkMode(isChecked);
        localStorage.setItem(storageKey, isChecked);
      });

      prefersDark.addEventListener('change', (e) => {
        if (localStorage.getItem(storageKey) === null) {
          applyDarkMode(e.matches);
        }
      });

      // --- BUSCA DINÂMICA DE LIVROS DO GOODREADS ---
      const rssUrl = 'https://www.goodreads.com/review/list_rss/106296664?key=Tye_yDTFjrNlBcqWzsUB8qulmcmV12bKfKUFwhC7VP2AIp8O&shelf=read';
      const apiProxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

      async function fetchBooks() {
        const container = document.getElementById('books-container');
        try {
          const response = await fetch(apiProxy);
          const data = await response.json();

          if (data.status === 'ok') {
            container.innerHTML = ''; 
            
            // Pega apenas os 3 primeiros para não poluir muito a lista
            const books = data.items.slice(0, 3);
            
            books.forEach(book => {
              const card = document.createElement('a');
              card.className = 'book-card';
              card.href = book.link;
              card.target = '_blank';
              card.rel = 'noopener';
              
              const author = book.author || 'Autor desconhecido';
              // Tentar pegar a imagem da descrição se o thumbnail estiver vazio
              let coverUrl = book.thumbnail;
              if (!coverUrl && book.description) {
                const imgMatch = book.description.match(/src="([^"]+)"/);
                if (imgMatch) coverUrl = imgMatch[1];
              }

              card.innerHTML = `
                <img src="${coverUrl || ''}" alt="Capa de ${book.title}" class="book-cover" onerror="this.src='https://placehold.co/45x65/1a2238/f7f6f3?text=📖'">
                <div class="book-info">
                  <span class="book-title" title="${book.title}">${book.title}</span>
                  <span class="book-author">${author}</span>
                </div>
              `;
              container.appendChild(card);
            });
          } else {
            throw new Error('Erro ao carregar feed');
          }
        } catch (error) {
          console.error('Goodreads fetch error:', error);
          container.innerHTML = '<div class="book-card" style="text-align: center;">Não foi possível carregar as leituras.</div>';
        }
      }

      fetchBooks();
    });
    </script>
  </body>
</html>
